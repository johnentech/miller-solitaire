<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8B5A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Solitaire">
  <meta name="description" content="Cozy cottage Klondike solitaire — works offline">
  <title>Cottage Solitaire</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>

  <script src="game.js"></script>
  <script src="ui.js"></script>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // Boot game
    window.addEventListener('DOMContentLoaded', () => {
      const game = new SolitaireGame();
      new SolitaireUI(game);
    });
  </script>
</body>
</html>
