<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6b4226">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Solitaire">
  <meta name="description" content="Cozy cottage Klondike solitaire — works offline">
  <title>Miller Solitaire</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>

  <script src="game.js"></script>
  <script src="ui.js"></script>
  <script>
    // Disable context menu (long-press on Android, right-click on desktop)
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // Boot game
    window.addEventListener('DOMContentLoaded', () => {
      const game = new SolitaireGame();
      new SolitaireUI(game);
    });
  </script>
</body>
</html>
